ru:
  help:
    current_page: "# Текущая страница: %title"
    start:
      title: "Старт"
      text: |
        Я клиент для `%app_name`. Меня можно использовать для:
        1) Интеграции аккаунта
        2) Подписки на организации, разделы и дедлайны
        3) И многого другого!

        Это небольшое руководство показывает доступные возможности.

        ## Формат команд
        Команды имеют следующий формат:
        ``` 1) /command <isOptional:ArgumentName:ExpectedType> - описание```
        Пример команды, которую вы уже видели:
        1) /help <optional:LANGUAGE:String> - показывает руководство на выбранном языке, если он поддерживается

        ### Пример использования:
        ```/help ru```

        > Сейчас доступны следующие языки:
        > `RU`, `EN`

        Выберите раздел _Чат_, чтобы начать
    subscription:
      title: "Подписки"
      text: |
        Есть несколько "уровней" подписок. Подписавшись на более высокий уровень, вы автоматически будете получать уведомления с нижних уровней.

        ## Иерархия:
        (выше) организация -> раздел -> дедлайн (ниже)

        > Если цель подписки имеет тип `PRIVATE`, сначала нужно создать аккаунт `%app_name` и привязать его (см. раздел `Верификация`)

        ## Команды:
        1) `/sub_org <ORGANIZATION_ID:Number>` - подписывает чат на указанную организацию
        2) `/sub_thr <THREAD_ID:Number>` - подписывает чат на указанный раздел
        3) `/sub_ddl <DEADLINE_ID:Number>` - подписывает чат на указанный дедлайн
        4) `/unsub_org <ORGANIZATION_ID:Number>` - отписывает чат от указанной организации
        5) `/unsub_thr <THREAD_ID:Number>` - отписывает чат от указанного раздела
        6) `/unsub_ddl <DEADLINE_ID:Number>` - отписывает чат от указанного дедлайна
        7) `/unsub_all` - удаляет все подписки чата

        > Замените `<TMP_VALUE>` на реальное значение, чтобы команда сработала
    chat:
      title: "Чат"
      text: |
        ## Команды:
        1) `/reg_chat lang=<LANGUAGE> timezone=<IANA_TIME_ZONE>` - регистрирует чат и задает предпочитаемые язык и часовой пояс (порядок аргументов не важен)
        2) `/update_chat_info [lang=<LANGUAGE>] [timezone=<IANA_TIME_ZONE>]` - обновляет название чата и, при необходимости, язык и/или часовой пояс
        3) `/dereg_chat` - удаляет регистрацию чата. *Все данные будут удалены, уведомления перестанут приходить*

        Чтобы начать получать уведомления, перейдите к разделу _Подписки_
        > Сейчас доступны следующие языки:
        > `RU`, `EN`
        > Пример часового пояса: `Europe/Moscow`
    verification:
      title: "Верификация"
      text: |
        ## Темы:
        1) Привязка аккаунта
           Перейдите в miniapp `%app_name` <TODO:NAVIGATION> и нажмите кнопку `Link account` (если вы не знаете свой Telegram id, используйте команду /my_id). Вы должны получить сообщение от меня. Разрешите личные сообщения, иначе я не смогу связаться с вами. Затем подтвердите запрос на привязку аккаунта.
           *Не подтверждайте запросы, которые вы не создавали. Отклоните их и создайте новый запрос*
           Если вы перешли сюда из раздела _Подписки_, теперь можно вернуться назад
        2) Регистрация
           <TODO>
