en:
  help:
    current_page: "# Current page: %title"
    start:
      title: "Start"
      text: |
        I am the client for `%app_name`. Can be used for
        1) Account integration
        2) Subscribing to organizations, threads, deadlines
        3) And much more!

        This little guide is meant to show all the functionality that I have.

        ## Command format
        Commands are going to be formatted in the following way:
        ``` 1) /command <isOptional:ArgumentName:ExpectedType> - description```
        One command that you have seen already:
        1) /help <optional:LANGUAGE:String> - displays the user manual using LANGUAGE language if supported

        ### Example usage:
        ```/help ru```

        > The following languages are currently available:
        > `RU`, `EN`

        Select _Chat_ chapter to start
    subscription:
      title: "Subscriptions"
      text: |
        There are multiple "layers" of possible subscriptions. By subscribing to the "higher" level you will automatically receive notifications from the lower levels as well.

        ## Hierarchy:
        (higher) organization -> thread -> deadline (lower)

        > If the target of your subscription is of type `PRIVATE` you will first need to create a `%app_name` account and link it (see `verification` chapter)

        ## Commands:
        1) `/sub_org <ORGANIZATION_ID:Number>` -  Subscribes chat to the given organization
        2) `/sub_thr <THREAD_ID:Number>` - Subscribes chat to the given thread
        3) `/sub_ddl <DEADLINE_ID:Number>` - Subscribes chat to the given deadline. 
        4) `/unsub_org <ORGANIZATION_ID:Number>` - Unsubscribes chat from the given organization
        5) `/unsub_thr <THREAD_ID:Number>` - Unsubscribes chat from the given thread
        6) `/unsub_ddl <DEADLINE_ID:Number>` - Unsubscribes chat from the given deadline
        7) `/unsub_all` - Removes all chat subscriptions

        > Replace the `<TMP_VALUE>` with an actual value for the command to work
    chat:
      title: "Chat"
      text: |
        ## Commands:
        1) `/reg_chat <LANGUAGE:String>` - Registers the chat and sets the preferred bot language
        2) `/update_chat_info <optional:LANGUAGE:String>` - updates the chat's title to the current one and overrides the preffered language
        3) `/dereg_chat` - deregisters the chat. *All the data will be deleted, you will stop receiving notification*

        Learn how to start receiving notification ba navigation to _Subscriptions_ chapter
        > The following languages are currently available:
        > `RU`, `EN`
    verification:
      title: "Verification"
      text: |
        ## Topics:
        1) Account linkage
           Go to the `%app_name` miniapp <TODO:NAVIGATION> and press `Link account` button (use /my_id command if you do not know your telegram id). You should receive a message from me. Please allow the direct messages, otherwise I will be unable to contact you. Then accept account linkage request.
           *Do not accept the requests which you did not issue. Decline them and reissue the request*
           If you jumped here from _Subscriptions_ you can go back now
        2) Registration
           <TODO>
